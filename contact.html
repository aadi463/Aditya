<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <style>
        body { margin: 0; font-family: Arial; }
        .navbar { background: #2c3e50; padding: 10px; text-align: center; }
        .navbar a { color: white; margin: 10px; text-decoration: none; }
        .form-container {
            padding: 40px;
            max-width: 400px;
            margin: auto;
        }
        input, textarea {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
        }
        button {
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact Us</a>
</div>

<div class="form-container">
    <h1>Contact Us</h1>

    <p>Email: support@travel.com</p>
    <p>Phone: +91 9876543210</p>

    <!-- Email Form -->
    <form action="mailto:support@travel.com" method="post" enctype="text/plain">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send</button>
    </form>
</div>

</body>
</html>
